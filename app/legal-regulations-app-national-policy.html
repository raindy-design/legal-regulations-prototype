<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>法律法规库 - App国家政策</title>
  <style>
    :root{
      --bg:#edf3fb;--card:#fff;--line:#e4ecf5;--text:#101828;--muted:#667085;
      --primary:#1677ff;--primary-weak:#eaf3ff;--shadow:0 14px 32px rgba(15,23,42,.08);--safe-bottom:env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text)}
    .phone{max-width:430px;margin:0 auto;min-height:100vh;padding:12px 14px calc(28px + var(--safe-bottom))}
    .topbar{display:flex;align-items:center;gap:10px;padding:4px 2px 14px}
    .back{width:40px;height:40px;border-radius:14px;border:0;background:#fff;box-shadow:var(--shadow);font-size:18px;flex-shrink:0}
    .title{flex:1;min-width:0}.title h1{margin:0;font-size:21px}.title p{margin:4px 0 0;font-size:12px;color:var(--muted)}
    .search-wrap{
      position:sticky;top:0;z-index:20;padding-bottom:10px;
      background:linear-gradient(180deg, rgba(237,243,251,.96), rgba(237,243,251,.8), rgba(237,243,251,0));backdrop-filter:blur(10px);
    }
    .search-shell{background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:8px;display:grid;gap:8px}
    .search-row{display:flex;gap:8px;align-items:center}
    .search-input{flex:1;height:44px;border-radius:14px;background:#f4f6fa;display:flex;align-items:center;gap:8px;padding:0 6px 0 14px}
    .search-input span{font-size:16px;color:#98a2b3}
    .search-input input{flex:1;border:0;background:transparent;outline:none;font-size:14px;color:var(--text)}
    .search-btn{width:36px;height:36px;border-radius:10px;border:0;background:var(--primary);color:#fff;font-size:16px;flex-shrink:0;cursor:pointer}
    .hero{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:18px;margin-top:2px}
    .hero h2{margin:6px 0 8px;font-size:22px;font-weight:700}
    .hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
    .stat{padding:14px;border-radius:16px;background:#f8fbff;border:1px solid var(--line)}
    .stat strong{display:block;margin-top:4px;font-size:22px}
    .filter-card{background:#fff;border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:16px;margin-top:14px;display:grid;gap:14px}
    .filter-label{font-size:13px;color:var(--muted);margin-bottom:6px}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{height:34px;padding:0 14px;border-radius:999px;border:1px solid var(--line);background:#fff;display:inline-flex;align-items:center;font-size:12px;cursor:pointer}
    .chip.active{background:var(--primary-weak);border-color:#cfe0ff;color:var(--primary);font-weight:700}
    .section-head{display:flex;justify-content:space-between;align-items:center;margin:20px 2px 12px}
    .section-head h3{margin:0;font-size:17px;font-weight:700;color:var(--text)}.section-head span{font-size:12px;color:var(--muted)}
    .list{display:grid;gap:12px}
    .doc-card{background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;display:grid;gap:12px}
    .doc-card h4{margin:0;font-size:17px;line-height:1.5}
    .meta{display:flex;gap:8px;flex-wrap:wrap;color:var(--muted);font-size:12px}
    .tag{height:24px;padding:0 10px;border-radius:999px;background:var(--primary-weak);color:var(--primary);display:inline-flex;align-items:center;font-size:12px;font-weight:700}
    .summary{margin:0;color:#667085;font-size:14px;line-height:1.8}
    .card-actions{display:flex;gap:10px}
    .action-btn{height:38px;padding:0 14px;border-radius:12px;border:1px solid var(--line);background:#fff;font-size:13px;cursor:pointer}
    .action-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
    .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(8px);background:rgba(15,23,42,.92);color:#fff;padding:12px 16px;border-radius:14px;font-size:13px;opacity:0;pointer-events:none;transition:.22s ease;z-index:80;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <button class="back" onclick="location.href='legal-regulations-app-home.html'">←</button>
      <div class="title">
        <h1>国家政策</h1>
      </div>
    </header>

    <section class="hero">
      <h2>国家政策</h2>
      <div class="hero-stats">
        <div class="stat"><span>文件总量</span><strong>286</strong></div>
        <div class="stat"><span>本周更新</span><strong>9</strong></div>
      </div>
    </section>

    <section class="search-wrap" style="position:static;padding-top:14px;padding-bottom:0;background:none;backdrop-filter:none;">
      <div class="search-shell">
        <div class="search-row">
          <label class="search-input">
            <span>⌕</span>
            <input id="searchInput" placeholder="请输入政策名称、文号、关键词">
            <button class="search-btn" id="searchBtn">⌕</button>
          </label>
        </div>
      </div>
    </section>

    <div class="filter-card">
      <div>
        <div class="filter-label">文件类型</div>
        <div class="chips" id="typeChips"></div>
      </div>
      <div>
        <div class="filter-label">发布机构</div>
        <div class="chips" id="orgChips"></div>
      </div>
    </div>

    <div class="section-head">
      <h3>检索结果</h3>
      <span id="resultCount">共找到 2 条</span>
    </div>

    <section class="list" id="list"></section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const docs = [
      { title:"关于进一步加强地下矿山安全生产工作的指导意见", type:"指导意见", org:"国家矿山安全监察局", date:"2026-03-22", views:"1,536", summary:"从风险分级管控、隐患排查治理、现场安全管理、应急处置和数字化监管等方面提出地下矿山安全生产提升要求。" },
      { title:"关于开展地下矿山安全生产专项整治行动的通知", type:"专项整治", org:"国务院安委会办公室", date:"2026-03-18", views:"1,204", summary:"围绕通风系统、防治水、机电运输、外包施工和重大隐患治理等重点内容，对专项整治任务进行统一部署。" }
    ];
    const typeOptions = ["全部","指导意见","通知公告","政策解读","专项整治"];
    const orgOptions = ["全部","国务院","应急管理部","国家矿山安全监察局"];
    const state = { q:"", type:"全部", org:"全部" };
    const toast = document.getElementById("toast");
    function showToast(t){toast.textContent=t;toast.classList.add("show");clearTimeout(showToast._t);showToast._t=setTimeout(()=>toast.classList.remove("show"),2200);}
    function renderChips(id, options, key){
      document.getElementById(id).innerHTML = options.map(o=>`<button class="chip ${state[key]===o?"active":""}" data-key="${key}" data-val="${o}">${o}</button>`).join("");
    }
    function filtered(){ return docs.filter(d=>(!state.q||`${d.title}${d.summary}${d.org}`.includes(state.q))&&(state.type==="全部"||d.type===state.type)&&(state.org==="全部"||d.org===state.org)); }
    function render(){
      const data = filtered();
      document.getElementById("resultCount").textContent = `共找到 ${data.length} 条`;
      document.getElementById("list").innerHTML = data.map(d=>`
        <article class="doc-card">
          <h4>${d.title}</h4>
          <div class="meta"><span class="tag">${d.type}</span><span>${d.org}</span><span>${d.date}</span><span>${d.views}</span></div>
          <p class="summary">${d.summary}</p>
          <div class="card-actions">
            <button class="action-btn primary" data-detail="legal-regulations-app-document-detail.html">详情</button>
          </div>
        </article>
      `).join("") || `<article class="doc-card"><h4>未找到匹配结果</h4><p class="summary">可尝试更换关键词或重置筛选条件。</p></article>`;
    }
    renderChips("typeChips", typeOptions, "type");
    renderChips("orgChips", orgOptions, "org");
    render();
    document.getElementById("searchBtn").addEventListener("click",()=>{state.q=document.getElementById("searchInput").value.trim();render();showToast(`已搜索：${state.q||"全部"}`);});
    document.getElementById("searchInput").addEventListener("keydown",e=>{if(e.key==="Enter")document.getElementById("searchBtn").click();});
    document.body.addEventListener("click",e=>{
      const chip=e.target.closest("[data-key]");
      const det=e.target.closest("[data-detail]");
      if(chip){state[chip.dataset.key]=chip.dataset.val;renderChips("typeChips",typeOptions,"type");renderChips("orgChips",orgOptions,"org");render();}
      if(det) location.href=det.dataset.detail;
    });
  </script>
</body>
</html>
