<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>法律法规库 - App首页</title>
  <style>
    :root{
      --bg:#edf3fb;
      --card:#ffffff;
      --line:#e4ecf5;
      --text:#101828;
      --muted:#667085;
      --primary:#1677ff;
      --primary-weak:#eaf3ff;
      --navy:#0f172a;
      --shadow:0 14px 32px rgba(15,23,42,.08);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:"PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    .phone{
      width:100%;
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      padding:12px 14px calc(108px + var(--safe-bottom));
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:4px 2px 14px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand-mark{
      width:42px;height:42px;border-radius:14px;display:grid;place-items:center;
      background:linear-gradient(135deg,#1677ff,#14b8a6);color:#fff;font-size:19px;box-shadow:var(--shadow);flex-shrink:0;
    }
    .brand h1{margin:0;font-size:21px;line-height:1.2}
    .search-wrap{
      position:sticky;top:0;z-index:20;padding:1px 0 10px;
      background:linear-gradient(180deg, rgba(237,243,251,.97), rgba(237,243,251,.82), rgba(237,243,251,0));
      backdrop-filter:blur(10px);
    }
    .search-shell{
      background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);
      padding:8px;display:flex;gap:8px;align-items:center;
    }
    .search-main{
      flex:1;display:flex;align-items:center;gap:8px;background:#f4f6fa;border-radius:14px;height:44px;padding:0 6px 0 14px;
    }
    .search-main span{color:#98a2b3;font-size:16px}
    .search-main input{flex:1;border:0;background:transparent;outline:none;font-size:14px;color:var(--text)}
    .search-btn{
      width:36px;height:36px;border-radius:10px;border:0;background:var(--navy);color:#fff;font-size:16px;flex-shrink:0;cursor:pointer;
    }
    .hero{
      background:#fff;border:1px solid var(--line);
      border-radius:24px;box-shadow:var(--shadow);padding:20px;position:relative;overflow:hidden;
      margin-bottom:12px;
    }
    .hero::after{
      content:"";position:absolute;right:-36px;bottom:-58px;width:170px;height:170px;border-radius:50%;
      background:radial-gradient(circle, rgba(22,119,255,.07), transparent 70%);
    }
    .hero-top{position:relative;z-index:1;display:grid;gap:14px}
    .hero-heading{display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
    .hero h2{margin:0;font-size:26px;line-height:1.15;color:var(--text)}
    .hero-subline{font-size:13px;font-weight:600;color:var(--primary);white-space:nowrap;background:var(--primary-weak);padding:4px 10px;border-radius:999px;}
    .hero-grid{display:grid;gap:10px}
    .hero-stats{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:14px
    }
    .stat-card{
      border-radius:16px;padding:10px 12px;border:1px solid var(--line);background:#f8fbff;
    }
    .stat-card span{font-size:11px;color:var(--muted)}
    .stat-card strong{display:block;margin-top:3px;font-size:19px;color:var(--text)}
    .section{margin-top:20px}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px}
    .section-head h3{margin:0;font-size:17px;font-weight:700;color:var(--text)}
    .shortcut-grid{
      display:grid;grid-template-columns:repeat(5,1fr);gap:10px;
    }
    .shortcut-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);
      padding:14px 8px;display:grid;gap:8px;cursor:pointer;position:relative;overflow:hidden;justify-items:center;text-align:center;
    }
    .shortcut-card::after{
      content:"";position:absolute;top:-18px;right:-14px;width:54px;height:54px;border-radius:50%;
      background:linear-gradient(135deg, rgba(22,119,255,.08), rgba(20,184,166,.12));
    }
    .shortcut-icon{
      width:40px;height:40px;border-radius:14px;display:grid;place-items:center;color:#fff;font-size:18px;position:relative;z-index:1;
    }
    .shortcut-card h4{margin:0;font-size:14px;line-height:1.4;position:relative;z-index:1;white-space:nowrap}
    .recent-list{display:grid;gap:12px}
    .recent-card{
      background:#fff;border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:16px;display:grid;gap:10px;
    }
    .recent-badge{
      width:fit-content;height:24px;padding:0 10px;border-radius:999px;background:var(--primary-weak);color:var(--primary);
      display:inline-flex;align-items:center;font-size:12px;font-weight:700;
    }
    .recent-card h4{margin:0;font-size:16px;line-height:1.5}
    .recent-meta{display:flex;flex-wrap:wrap;gap:10px;color:var(--muted);font-size:12px}
    .tabbar{
      position:fixed;left:50%;bottom:14px;transform:translateX(-50%);width:min(calc(100% - 20px), 410px);
      padding:8px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.92);
      box-shadow:0 16px 40px rgba(15,23,42,.14);backdrop-filter:blur(14px);display:grid;grid-template-columns:repeat(3,1fr);gap:6px;z-index:30;
    }
    .tab-item{
      height:52px;border-radius:16px;display:grid;place-items:center;text-decoration:none;color:#667085;font-size:12px;line-height:1.2;white-space:nowrap;
    }
    .tab-item.active{background:var(--primary-weak);color:var(--primary);font-weight:700}
    .toast{
      position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(8px);background:rgba(15,23,42,.92);color:#fff;
      padding:12px 16px;border-radius:14px;font-size:13px;opacity:0;pointer-events:none;transition:.22s ease;z-index:40;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
  <div class="phone">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">⚖</div>
        <div>
          <h1>首页</h1>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-top">
        <div class="hero-grid">
          <div>
            <div class="hero-heading">
              <h2>法律法规库</h2>
              <div class="hero-subline">本周更新 12 条</div>
            </div>
            <div class="hero-stats">
              <div class="stat-card"><span>文件总量</span><strong>1,286</strong></div>
              <div class="stat-card"><span>最新发布</span><strong>28</strong></div>
              <div class="stat-card"><span>隐患库</span><strong>96</strong></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="search-wrap">
      <div class="search-shell">
        <label class="search-main">
          <span>⌕</span>
          <input id="searchInput" type="text" placeholder="搜索法律法规、条例、规章...">
          <button class="search-btn" id="searchBtn" type="button">⌕</button>
        </label>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h3>快捷入口</h3>
      </div>
      <div class="shortcut-grid">
        <article class="shortcut-card" data-href="legal-regulations-app-list.html">
          <div class="shortcut-icon" style="background:linear-gradient(135deg,#1677ff,#5aa0ff)">📘</div>
          <h4>法律法规</h4>
        </article>
        <article class="shortcut-card" data-href="legal-regulations-app-hazard-library.html">
          <div class="shortcut-icon" style="background:linear-gradient(135deg,#f97316,#fb923c)">⚠</div>
          <h4>隐患库</h4>
        </article>
        <article class="shortcut-card" data-href="legal-regulations-app-national-policy.html">
          <div class="shortcut-icon" style="background:linear-gradient(135deg,#0f766e,#14b8a6)">📄</div>
          <h4>国家政策</h4>
        </article>
        <article class="shortcut-card" data-href="legal-regulations-app-latest-release.html">
          <div class="shortcut-icon" style="background:linear-gradient(135deg,#e11d48,#fb7185)">🕘</div>
          <h4>最新发布</h4>
        </article>
        <article class="shortcut-card" data-href="legal-regulations-app-government-info.html">
          <div class="shortcut-icon" style="background:linear-gradient(135deg,#1d4ed8,#2563eb)">🏛</div>
          <h4>政府信息</h4>
        </article>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h3>最近在看</h3>
      </div>
      <div class="recent-list">
        <article class="recent-card" data-href="legal-regulations-app-document-detail.html" style="cursor:pointer;">
          <span class="recent-badge">法律法规</span>
          <h4>金属非金属地下矿山安全规程</h4>
          <div class="recent-meta"><span>今天 10:26</span><span>国家标准</span></div>
        </article>
        <article class="recent-card" data-href="legal-regulations-app-document-detail.html" style="cursor:pointer;">
          <span class="recent-badge">隐患库</span>
          <h4>地下矿山重大事故隐患判定标准</h4>
          <div class="recent-meta"><span>今天 09:12</span><span>应急管理部</span></div>
        </article>
        <article class="recent-card" data-href="legal-regulations-app-document-detail.html" style="cursor:pointer;">
          <span class="recent-badge">国家政策</span>
          <h4>关于进一步加强矿山安全生产工作的指导意见</h4>
          <div class="recent-meta"><span>昨天 16:45</span><span>国家矿山安全监察局</span></div>
        </article>
      </div>
    </section>
  </div>

  <nav class="tabbar">
    <a class="tab-item active" href="legal-regulations-app-home.html">首页</a>
    <a class="tab-item" href="legal-regulations-app-list.html">法律法规</a>
    <a class="tab-item" href="legal-regulations-app-hazard-library.html">隐患库</a>
  </nav>

  <div class="toast" id="toast"></div>

  <script>
    const toast = document.getElementById("toast");
    const input = document.getElementById("searchInput");
    function showToast(text){toast.textContent=text;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),2200);}
    document.getElementById("searchBtn").addEventListener("click", () => {
      const q = input.value.trim();
      location.href = `legal-regulations-app-list.html${q ? `?q=${encodeURIComponent(q)}` : ""}`;
    });
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") document.getElementById("searchBtn").click(); });
    document.querySelectorAll("[data-href]").forEach((item) => item.addEventListener("click", () => { location.href = item.dataset.href; }));
  </script>
</body>
</html>
